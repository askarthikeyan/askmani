<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karthiketan A S | Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.2rem;
      color: #cbd5e1;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .notify-btn {
      display: inline-block;
      padding: 14px 28px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .notify-btn:hover {
      background: #7dd3fc;
      transform: translateY(-2px);
    }

    .logo {
      font-size: 1.2rem;
      margin-bottom: 25px;
      color: #38bdf8;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.8rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">Karthiketan A S</div>

    <h1>Portfolio Coming Soon</h1>

    <p>
      AI Engineer specializing in Computer Vision, Sports Analytics, Embedded AI, and Wearable Systems.<br>
      A full portfolio showcasing boxing analytics, multi-camera tracking, and AI research projects is launching soon.
    </p>

    <a href="#" class="notify-btn">View Resume</a>
  </div>
</body>
</html>
